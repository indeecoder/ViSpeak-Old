<!-- frontend/app.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ViSpeak Communicator</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <!-- Google Fonts: Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Google Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <!-- MediaPipe Face Mesh for Eye Tracking -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

    <style>
        /* Custom styles for wooden theme and native feel */
        body {
            font-family: 'Poppins', sans-serif;
        }
        .wooden-bg {
            background-color: #D2B48C; /* Tan */
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M11 18c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm48 25c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm-43-7c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm63 31c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM34 90c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm56-76c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM12 86c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm28-65c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm23-11c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-6 60c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm29 22c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zM32 63c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm57-13c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-9-21c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM60 91c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM35 41c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM12 60c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2z' fill='%23a0826d' fill-opacity='0.1' fill-rule='evenodd'/%3E%3C/svg%3E");
        }
        .wooden-panel {
            background-color: #A0826D; /* Sienna */
            border: 2px solid #8B6F47; /* Darker wood */
        }
        .command-btn {
            background-color: #F5DEB3; /* Wheat */
            border: 2px solid #D2B48C; /* Tan */
            transition: all 0.2s ease-in-out;
        }
        .command-btn:hover {
            background-color: #E6D4A3;
        }
        .command-btn.active {
            background-color: #CDAF7D; /* A darker, active wood color */
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
        }
        .command-btn.selected {
            animation: flash 0.5s;
        }
        @keyframes flash {
            0% { background-color: #CDAF7D; }
            50% { background-color: #fdfd96; }
            100% { background-color: #CDAF7D; }
        }
        /* Hide the canvas used for processing */
        #canvas-element {
            display: none;
        }
    </style>
</head>
<body class="wooden-bg h-screen flex items-center justify-center p-4">

    <div x-data="eyeSpeakApp()" x-init="init()" class="w-full max-w-4xl">
        <div class="wooden-panel rounded-2xl shadow-2xl p-4 md:p-6 relative aspect-square flex flex-col">
            <!-- Header -->
            <div class="flex justify-between items-center mb-4 flex-shrink-0">
                <h1 class="text-xl md:text-2xl lg:text-3xl font-bold text-white">ViSpeak.</h1>
                <div class="relative">
                    <video id="video-element" class="w-16 h-16 md:w-20 md:h-20 lg:w-24 lg:h-24 rounded-lg border-2 border-white shadow-lg object-cover"></video>
                    <span class="absolute bottom-1 right-1 bg-green-500 w-3 h-3 rounded-full border-2 border-white"></span>
                </div>
            </div>

            <!-- Command Grid -->
            <div class="grid grid-cols-3 gap-2 md:gap-4 flex-grow">
                <!-- Top Left (Drink) -->
                <div 
                    :class="{'active': activeDirection === 'top-left'}"
                    class="command-btn rounded-xl p-2 md:p-4 flex flex-col items-center justify-center text-center cursor-pointer"
                    @dblclick="startEditing('top_left')"
                    @touchstart="handleTouchStart($event, 'top_left')"
                    @touchend="handleTouchEnd"
                    @click="speak(commands.top_left)">
                    <span class="material-icons text-3xl md:text-4xl lg:text-5xl text-amber-800">local_drink</span>
                    <template x-if="editingCommand === 'top_left'">
                        <input type="text" x-model="commands.top_left" @keyup.enter="stopEditing()" @blur="stopEditing()" @change="saveCommandsToStorage()" class="mt-1 md:mt-2 text-xs md:text-sm font-semibold text-center bg-transparent border-b border-amber-900 w-full outline-none">
                    </template>
                    <template x-if="editingCommand !== 'top_left'">
                        <p class="mt-1 md:mt-2 text-xs md:text-sm font-semibold text-amber-900" x-text="commands.top_left"></p>
                    </template>
                </div>
                <!-- Top (Yes) -->
                <div 
                    :class="{'active': activeDirection === 'top'}"
                    class="command-btn rounded-xl p-2 md:p-4 flex flex-col items-center justify-center text-center cursor-pointer"
                    @dblclick="startEditing('top')"
                    @touchstart="handleTouchStart($event, 'top')"
                    @touchend="handleTouchEnd"
                    @click="speak(commands.top)">
                    <span class="material-icons text-3xl md:text-4xl lg:text-5xl text-amber-800">thumb_up</span>
                    <template x-if="editingCommand === 'top'">
                        <input type="text" x-model="commands.top" @keyup.enter="stopEditing()" @blur="stopEditing()" @change="saveCommandsToStorage()" class="mt-1 md:mt-2 text-xs md:text-sm font-semibold text-center bg-transparent border-b border-amber-900 w-full outline-none">
                    </template>
                    <template x-if="editingCommand !== 'top'">
                        <p class="mt-1 md:mt-2 text-xs md:text-sm font-semibold text-amber-900" x-text="commands.top"></p>
                    </template>
                </div>
                <!-- Top Right (Eat) -->
                <div 
                    :class="{'active': activeDirection === 'top-right'}"
                    class="command-btn rounded-xl p-2 md:p-4 flex flex-col items-center justify-center text-center cursor-pointer"
                    @dblclick="startEditing('top_right')"
                    @touchstart="handleTouchStart($event, 'top_right')"
                    @touchend="handleTouchEnd"
                    @click="speak(commands.top_right)">
                    <span class="material-icons text-3xl md:text-4xl lg:text-5xl text-amber-800">restaurant</span>
                    <template x-if="editingCommand === 'top_right'">
                        <input type="text" x-model="commands.top_right" @keyup.enter="stopEditing()" @blur="stopEditing()" @change="saveCommandsToStorage()" class="mt-1 md:mt-2 text-xs md:text-sm font-semibold text-center bg-transparent border-b border-amber-900 w-full outline-none">
                    </template>
                    <template x-if="editingCommand !== 'top_right'">
                        <p class="mt-1 md:mt-2 text-xs md:text-sm font-semibold text-amber-900" x-text="commands.top_right"></p>
                    </template>
                </div>
                <!-- Left (Thank You) -->
                <div 
                    :class="{'active': activeDirection === 'left'}"
                    class="command-btn rounded-xl p-2 md:p-4 flex flex-col items-center justify-center text-center cursor-pointer"
                    @dblclick="startEditing('left')"
                    @touchstart="handleTouchStart($event, 'left')"
                    @touchend="handleTouchEnd"
                    @click="speak(commands.left)">
                    <span class="material-icons text-3xl md:text-4xl lg:text-5xl text-amber-800">favorite</span>
                    <template x-if="editingCommand === 'left'">
                        <input type="text" x-model="commands.left" @keyup.enter="stopEditing()" @blur="stopEditing()" @change="saveCommandsToStorage()" class="mt-1 md:mt-2 text-xs md:text-sm font-semibold text-center bg-transparent border-b border-amber-900 w-full outline-none">
                    </template>
                    <template x-if="editingCommand !== 'left'">
                        <p class="mt-1 md:mt-2 text-xs md:text-sm font-semibold text-amber-900" x-text="commands.left"></p>
                    </template>
                </div>
                <!-- Center (Spacer) -->
                <div class="rounded-xl p-2 md:p-4 flex flex-col items-center justify-center text-center opacity-50 cursor-not-allowed">
                     <span class="material-icons text-3xl md:text-4xl lg:text-5xl text-amber-800">visibility</span>
                </div>
                <!-- Right (Need Help) -->
                <div 
                    :class="{'active': activeDirection === 'right'}"
                    class="command-btn rounded-xl p-2 md:p-4 flex flex-col items-center justify-center text-center cursor-pointer"
                    @dblclick="startEditing('right')"
                    @touchstart="handleTouchStart($event, 'right')"
                    @touchend="handleTouchEnd"
                    @click="speak(commands.right)">
                    <span class="material-icons text-3xl md:text-4xl lg:text-5xl text-amber-800">help</span>
                    <template x-if="editingCommand === 'right'">
                        <input type="text" x-model="commands.right" @keyup.enter="stopEditing()" @blur="stopEditing()" @change="saveCommandsToStorage()" class="mt-1 md:mt-2 text-xs md:text-sm font-semibold text-center bg-transparent border-b border-amber-900 w-full outline-none">
                    </template>
                    <template x-if="editingCommand !== 'right'">
                        <p class="mt-1 md:mt-2 text-xs md:text-sm font-semibold text-amber-900" x-text="commands.right"></p>
                    </template>
                </div>
                <!-- Bottom Left (Pain) -->
                <div 
                    :class="{'active': activeDirection === 'bottom-left'}"
                    class="command-btn rounded-xl p-2 md:p-4 flex flex-col items-center justify-center text-center cursor-pointer"
                    @dblclick="startEditing('bottom_left')"
                    @touchstart="handleTouchStart($event, 'bottom_left')"
                    @touchend="handleTouchEnd"
                    @click="speak(commands.bottom_left)">
                    <span class="material-icons text-3xl md:text-4xl lg:text-5xl text-amber-800">sick</span>
                    <template x-if="editingCommand === 'bottom_left'">
                        <input type="text" x-model="commands.bottom_left" @keyup.enter="stopEditing()" @blur="stopEditing()" @change="saveCommandsToStorage()" class="mt-1 md:mt-2 text-xs md:text-sm font-semibold text-center bg-transparent border-b border-amber-900 w-full outline-none">
                    </template>
                    <template x-if="editingCommand !== 'bottom_left'">
                        <p class="mt-1 md:mt-2 text-xs md:text-sm font-semibold text-amber-900" x-text="commands.bottom_left"></p>
                    </template>
                </div>
                <!-- Bottom (No) -->
                <div 
                    :class="{'active': activeDirection === 'bottom'}"
                    class="command-btn rounded-xl p-2 md:p-4 flex flex-col items-center justify-center text-center cursor-pointer"
                    @dblclick="startEditing('bottom')"
                    @touchstart="handleTouchStart($event, 'bottom')"
                    @touchend="handleTouchEnd"
                    @click="speak(commands.bottom)">
                    <span class="material-icons text-3xl md:text-4xl lg:text-5xl text-amber-800">thumb_down</span>
                    <template x-if="editingCommand === 'bottom'">
                        <input type="text" x-model="commands.bottom" @keyup.enter="stopEditing()" @blur="stopEditing()" @change="saveCommandsToStorage()" class="mt-1 md:mt-2 text-xs md:text-sm font-semibold text-center bg-transparent border-b border-amber-900 w-full outline-none">
                    </template>
                    <template x-if="editingCommand !== 'bottom'">
                        <p class="mt-1 md:mt-2 text-xs md:text-sm font-semibold text-amber-900" x-text="commands.bottom"></p>
                    </template>
                </div>
                <!-- Bottom Right (Toilet) -->
                <div 
                    :class="{'active': activeDirection === 'bottom-right'}"
                    class="command-btn rounded-xl p-2 md:p-4 flex flex-col items-center justify-center text-center cursor-pointer"
                    @dblclick="startEditing('bottom_right')"
                    @touchstart="handleTouchStart($event, 'bottom_right')"
                    @touchend="handleTouchEnd"
                    @click="speak(commands.bottom_right)">
                    <span class="material-icons text-3xl md:text-4xl lg:text-5xl text-amber-800">wc</span>
                    <template x-if="editingCommand === 'bottom_right'">
                        <input type="text" x-model="commands.bottom_right" @keyup.enter="stopEditing()" @blur="stopEditing()" @change="saveCommandsToStorage()" class="mt-1 md:mt-2 text-xs md:text-sm font-semibold text-center bg-transparent border-b border-amber-900 w-full outline-none">
                    </template>
                    <template x-if="editingCommand !== 'bottom_right'">
                        <p class="mt-1 md:mt-2 text-xs md:text-sm font-semibold text-amber-900" x-text="commands.bottom_right"></p>
                    </template>
                </div>
            </div>
        </div>
    </div>

    <canvas id="canvas-element"></canvas>

    <script>
        function speakText(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                window.speechSynthesis.speak(utterance);
            } else {
                console.error("Browser does not support text-to-speech.");
            }
        }

        function eyeSpeakApp() {
            return {
                commands: {},
                activeDirection: null,
                editingCommand: null,
                dwellTimer: null,
                longPressTimer: null,
                dwellTime: 1500,
                longPressTime: 500,
                storageKey: 'viSpeakCommands',

                async init() {
                    await this.loadCommandsFromStorage();
                    this.setupEyeTracking();
                },

                async loadCommandsFromStorage() {
                    const storedCommands = localStorage.getItem(this.storageKey);
                    if (storedCommands) {
                        this.commands = JSON.parse(storedCommands);
                    } else {
                        console.log("No commands in storage. Loading defaults from server.");
                        try {
                            const response = await fetch('/load_commands');
                            if (response.ok) {
                                this.commands = await response.json();
                                this.saveCommandsToStorage();
                            } else {
                                console.error('Failed to load default commands from server.');
                            }
                        } catch (error) {
                            console.error('Error fetching default commands:', error);
                        }
                    }
                },

                saveCommandsToStorage() {
                    localStorage.setItem(this.storageKey, JSON.stringify(this.commands));
                    console.log("Commands saved to local storage.");
                },
                
                speak(text) {
                    if (!text || this.editingCommand) return;
                    
                    const activeBtn = document.querySelector('.command-btn.active');
                    if(activeBtn) {
                        activeBtn.classList.add('selected');
                        setTimeout(() => activeBtn.classList.remove('selected'), 500);
                    }
                    speakText(text);
                },

                startEditing(commandKey) {
                    this.editingCommand = commandKey;
                },

                stopEditing() {
                    this.editingCommand = null;
                    this.saveCommandsToStorage();
                },

                handleTouchStart(event, commandKey) {
                    event.preventDefault();
                    this.longPressTimer = setTimeout(() => {
                        this.startEditing(commandKey);
                    }, this.longPressTime);
                },

                handleTouchEnd() {
                    clearTimeout(this.longPressTimer);
                },

                // --- MAJOR UPDATE: Accurate Eye Tracking Logic with Mirroring Fix ---
                setupEyeTracking() {
                    const videoElement = document.getElementById('video-element');
                    const canvasElement = document.getElementById('canvas-element');
                    const canvasCtx = canvasElement.getContext('2d');

                    const onResults = (results) => {
                        canvasCtx.save();
                        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
                        
                        if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                            const landmarks = results.multiFaceLandmarks[0];
                            
                            // Landmarks for Left Eye
                            const leftIris = landmarks[468];
                            const leftEyeOuterCorner = landmarks[33];
                            const leftEyeInnerCorner = landmarks[133];
                            const leftEyeTop = landmarks[159];
                            const leftEyeBottom = landmarks[145];

                            // Landmarks for Right Eye
                            const rightIris = landmarks[473];
                            const rightEyeOuterCorner = landmarks[362];
                            const rightEyeInnerCorner = landmarks[263];
                            const rightEyeTop = landmarks[158];
                            const rightEyeBottom = landmarks[144];

                            // Calculate horizontal gaze ratio for left eye (0 to 1)
                            const leftGazeX = (leftIris.x - leftEyeOuterCorner.x) / (leftEyeInnerCorner.x - leftEyeOuterCorner.x);
                            // Calculate vertical gaze ratio for left eye (0 to 1)
                            const leftGazeY = (leftIris.y - leftEyeTop.y) / (leftEyeBottom.y - leftEyeTop.y);

                            // Calculate horizontal gaze ratio for right eye (0 to 1)
                            const rightGazeX = (rightIris.x - rightEyeOuterCorner.x) / (rightEyeInnerCorner.x - rightEyeOuterCorner.x);
                            // Calculate vertical gaze ratio for right eye (0 to 1)
                            const rightGazeY = (rightIris.y - rightEyeTop.y) / (rightEyeBottom.y - rightEyeTop.y);

                            // Average gaze from both eyes for more stability
                            const avgGazeX = (leftGazeX + rightGazeX) / 2;
                            const avgGazeY = (leftGazeY + rightGazeY) / 2;

                            let currentDirection = null;
                            // FIX: Inverted the horizontal logic to match user's perspective
                            if (avgGazeY < 0.4) { // Looking up
                                if (avgGazeX < 0.4) currentDirection = 'top-right'; // User looks left, iris is on left
                                else if (avgGazeX > 0.6) currentDirection = 'top-left'; // User looks right, iris is on right
                                else currentDirection = 'top';
                            } else if (avgGazeY > 0.6) { // Looking down
                                if (avgGazeX < 0.4) currentDirection = 'bottom-right'; // FIX
                                else if (avgGazeX > 0.6) currentDirection = 'bottom-left'; // FIX
                                else currentDirection = 'bottom';
                            } else { // Looking straight ahead
                                if (avgGazeX < 0.3) currentDirection = 'right'; // FIX
                                else if (avgGazeX > 0.7) currentDirection = 'left'; // FIX
                            }

                            // Handle dwell time logic
                            if (currentDirection && currentDirection !== this.activeDirection) {
                                clearTimeout(this.dwellTimer);
                                this.activeDirection = currentDirection;
                                this.dwellTimer = setTimeout(() => {
                                    this.speak(this.commands[currentDirection]);
                                }, this.dwellTime);
                            } else if (!currentDirection) {
                                clearTimeout(this.dwellTimer);
                                this.activeDirection = null;
                            }
                        }
                        canvasCtx.restore();
                    };

                    const faceMesh = new FaceMesh({
                        locateFile: (file) => {
                            return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
                        },
                    });

                    faceMesh.setOptions({
                        maxNumFaces: 1,
                        refineLandmarks: true, // Crucial for accurate iris and eyelid landmarks
                        minDetectionConfidence: 0.5,
                        minTrackingConfidence: 0.5
                    });
                    faceMesh.onResults(onResults);

                    const camera = new Camera(videoElement, {
                        onFrame: async () => {
                            await faceMesh.send({image: videoElement});
                        },
                        width: 640,
                        height: 480
                    });
                    camera.start();
                }
            }
        }
    </script>
</body>
</html>
